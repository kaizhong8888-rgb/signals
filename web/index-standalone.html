<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AI量化信号</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#0a0e1a;color:#f1f5f9;line-height:1.6}.container{max-width:800px;margin:0 auto;padding:20px}header{padding:40px 0 32px;border-bottom:1px solid #1e293b;margin-bottom:32px}.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#6366f1,#818cf8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}h1{font-size:28px;font-weight:700}.subtitle{color:#94a3b8;font-size:15px}.date-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:20px;font-size:13px;color:#a5b4fc;margin-top:16px}.date-badge::before{content:"";width:6px;height:6px;background:#10b981;border-radius:50%}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}.stat-card{background:#111827;border:1px solid #1e293b;border-radius:12px;padding:20px;text-align:center}.stat-value{font-size:32px;font-weight:700}.stat-label{font-size:13px;color:#64748b;margin-top:4px}.signal-card{background:#111827;border:1px solid #1e293b;border-radius:12px;border-left:3px solid;padding:20px;margin-bottom:12px}.signal-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}.signal-name{font-size:17px;font-weight:600}.signal-code{font-size:13px;color:#64748b;font-family:monospace}.signal-badge{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;border:1px solid}.signal-metrics{display:flex;gap:24px;margin-bottom:12px;flex-wrap:wrap}.metric{display:flex;flex-direction:column}.metric-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px}.metric-value{font-size:15px;font-weight:600;font-family:monospace}.signal-reason{padding:10px 14px;background:rgba(99,102,241,.06);border-radius:8px;font-size:14px;color:#94a3b8;border-left:2px solid #6366f1}.cta-section{background:linear-gradient(135deg,rgba(99,102,241,.1),rgba(16,185,129,.08));border:1px solid rgba(99,102,241,.2);border-radius:12px;padding:32px;text-align:center;margin:40px 0}.cta-price{display:flex;align-items:baseline;justify-content:center;gap:4px;margin-bottom:20px}.cta-price .amount{font-size:40px;font-weight:800;color:#10b981}.cta-price .period{font-size:15px;color:#64748b}.cta-features{display:flex;justify-content:center;gap:24px;margin-bottom:24px;flex-wrap:wrap;color:#94a3b8;font-size:14px}.cta-button{display:inline-flex;align-items:center;padding:14px 32px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;font-size:16px;font-weight:600;border-radius:10px;text-decoration:none;border:none;cursor:pointer}.disclaimer{padding:16px;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;font-size:13px;color:#64748b;margin-bottom:32px}footer{padding:24px 0;border-top:1px solid #1e293b;text-align:center;font-size:13px;color:#64748b}@media(max-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}}</style></head><body><div class="container"><header><div class="logo-row"><div class="logo-icon">📊</div><h1>AI量化信号</h1></div><p class="subtitle">AI选股 + 高股息策略 · 双重验证</p><div class="date-badge" id="date-badge"></div></header><div class="stats-grid" id="stats"></div><div id="signals"></div><div class="cta-section"><h2 style="font-size:22px;font-weight:700;margin-bottom:8px">订阅每日量化信号</h2><p style="color:#94a3b8;margin-bottom:24px;font-size:15px">每个交易日盘后自动推送选股信号</p><div class="cta-price"><span class="amount">¥299</span><span class="period">/月</span></div><div class="cta-features"><span>✓ 每日AI选股信号</span><span>✓ 高股息组合</span><span>✓ 持仓诊断</span><span>✓ 微信推送</span></div><button class="cta-button" onclick="window.open('https://mp.weixin.qq.com')">关注公众号获取信号 →</button><p style="margin-top:16px;font-size:13px;color:#64748b">已验证策略年化 ~26% · 最大回撤 ~25%</p></div><div class="disclaimer"><strong style="color:#f59e0b">⚠️ 风险提示：</strong>本报告基于量化模型自动生成，仅供学习研究，不构成投资建议。</div><footer><p>AI量化信号系统 · 数据来源：腾讯财经API + 东方财富</p></footer></div><script>fetch('https://raw.githubusercontent.com/kaizhong8888-rgb/ai-assistant/main/signals-data/latest.json').then(r=>r.json()).then(d=>{document.getElementById('date-badge').textContent=d.date;document.getElementById('stats').innerHTML='<div class="stat-card"><div class="stat-value">'+d.total_signals+'</div><div class="stat-label">信号总数</div></div><div class="stat-card"><div class="stat-value" style="color:#10b981">'+d.strong_signals+'</div><div class="stat-label">强烈 ★★★</div></div><div class="stat-card"><div class="stat-value" style="color:#f59e0b">'+d.moderate_signals+'</div><div class="stat-label">关注 ★★</div></div><div class="stat-card"><div class="stat-value">'+d.market_summary.ai_positive_growth+'</div><div class="stat-label">AI正成长股</div></div>';let h='';d.signals.forEach((s,i)=>{const st=s.strength==='STRONG';const c=st?'#10b981':'#f59e0b';const b=st?'★★★ 强烈':'★★ 关注';const bg=st?'rgba(16,185,129,.15)':'rgba(245,158,11,.15)';const pc=s.profit_growth>=0?'#10b981':'#ef4444';h+='<div class="signal-card" style="border-left-color:'+c+'"><div class="signal-top"><div><div class="signal-name">'+(i+1)+'. '+s.name+'</div><div class="signal-code">'+s.code+'</div></div><span class="signal-badge" style="background:'+bg+';color:'+c+';border-color:'+c+'">'+b+'</span></div><div class="signal-metrics"><div class="metric"><span class="metric-label">现价</span><span class="metric-value">¥'+s.price.toFixed(2)+'</span></div><div class="metric"><span class="metric-label">PE</span><span class="metric-value">'+s.pe.toFixed(1)+'</span></div><div class="metric"><span class="metric-label">ROE</span><span class="metric-value">'+s.roe.toFixed(1)+'%</span></div><div class="metric"><span class="metric-label">利润增速</span><span class="metric-value" style="color:'+pc+'">'+(s.profit_growth>=0?'+':'')+s.profit_growth.toFixed(1)+'%</span></div></div><div class="signal-reason">💡 '+s.reason+'</div></div>'});document.getElementById('signals').innerHTML='<h2 style="font-size:18px;font-weight:600;margin-bottom:16px">今日选股信号</h2>'+h}).catch(()=>{document.getElementById('date-badge').textContent='数据加载中...';document.getElementById('signals').innerHTML='<p style="text-align:center;color:#64748b;padding:40px">信号数据加载失败，请稍后重试</p>'});</script></body></html>
